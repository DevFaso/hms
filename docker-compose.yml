version: "3.9"

services:
  # ── Local PostgreSQL (profile: local) ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hms-postgres
    environment:
      POSTGRES_DB: hospital_db
      POSTGRES_USER: hospital_user
      POSTGRES_PASSWORD: hospital_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospital_user -d hospital_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dev PostgreSQL (profile: dev) ──────────────────────────
  postgres-dev:
    image: postgres:16-alpine
    container_name: hms-postgres-dev
    environment:
      POSTGRES_DB: hms_dev
      POSTGRES_USER: hms_dev_user
      POSTGRES_PASSWORD: hms_dev_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_dev_user -d hms_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── UAT PostgreSQL (profile: uat) ──────────────────────────
  postgres-uat:
    image: postgres:16-alpine
    container_name: hms-postgres-uat
    environment:
      POSTGRES_DB: hms_uat
      POSTGRES_USER: hms_uat_user
      POSTGRES_PASSWORD: hms_uat_pass
    ports:
      - "5434:5432"
    volumes:
      - pgdata_uat:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_uat_user -d hms_uat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: hms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    container_name: hms-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  pgdata:
  pgdata_dev:
  pgdata_uat:
  prometheus_data:
  grafana_data:
  # Named volume for backend uploaded files (profile images, attachments, etc.).
  # To use this locally, mount it in your backend service:
  #   volumes:
  #     - hms_uploads:/app/uploads
  # On Railway, add a Persistent Volume in the backend service settings and
  # set APP_UPLOAD_DIR to the mount path (e.g. /data/uploads).
  hms_uploads:
