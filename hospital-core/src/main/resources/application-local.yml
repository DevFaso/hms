# Local PostgreSQL profile — uses docker-compose PostgreSQL
# Start DB first:  docker compose up -d postgres
# Then run app:    ./gradlew :hospital-core:bootRun --args='--spring.profiles.active=local'
server:
  port: 8081

spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/hospital_db
    username: hospital_user
    password: hospital_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        '[format_sql]': true
  liquibase:
    enabled: true
    contexts: local
  flyway:
    enabled: false

logging:
  level:
    '[com.example.hms]': DEBUG
    '[org.hibernate.SQL]': DEBUG

# ===================== Seed Data =====================
# Roles and org security data are managed by Liquibase migrations.
# Java-based seeders (RoleSeeder, OrganizationSecuritySeeder) also run
# under the "local" profile as a safety net.
app:
  seed:
    enabled: true
    synthetic:
      enabled: true
  security:
    totp-encryption-key: "a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2"
  # Frontend base URL — localhost only for local dev.
  frontend:
    base-url: http://localhost:4200
