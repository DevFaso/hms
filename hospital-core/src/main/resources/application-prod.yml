# Production profile — Railway / cloud PostgreSQL
server:
  port: ${PORT:8081}
  shutdown: graceful
  compression:
    enabled: true
  http2:
    enabled: true
  error:
    include-message: never
    include-binding-errors: never

spring:
  config:
    activate:
      on-profile: prod
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hospital_db}
    username: ${SPRING_DATASOURCE_USERNAME:hms_app}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
  liquibase:
    enabled: true
    # Liquibase uses hms_migrator (DDL privileges) — separate from the app user
    user: ${LIQUIBASE_USERNAME:postgres}
    password: ${LIQUIBASE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
    url: ${LIQUIBASE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hospital_db}}

logging:
  level:
    root: INFO
    '[org.springframework]': INFO
    '[org.hibernate]': WARN
    '[com.example.hms]': INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

# ===================== Seed Data =====================
# Roles and org security data are managed by Liquibase migrations
# (V4__seed_roles.sql, V5__seed_default_organization_security.sql).
# Java-based seeders are disabled in production.
app:
  seed:
    enabled: false
    synthetic:
      enabled: false
  # Frontend base URL used in emails, activation links, and onboarding flows.
  # Set FRONTEND_BASE_URL=https://hms.bitnesttechs.com in Railway env vars.
  frontend:
    base-url: ${FRONTEND_BASE_URL:https://hms.bitnesttechs.com}
  # Set PUBLIC_BASE_URL to the public-facing HTTPS domain so that uploaded
  # file links returned to the browser point to a reachable URL rather than
  # the internal Railway hostname.
  # Example: PUBLIC_BASE_URL=https://api.hms.bitnesttechs.com
  public-base-url: ${PUBLIC_BASE_URL:}
  # CORS allowed origins: must include the public frontend domain and patient app.
  # Set CORS_ALLOWED_ORIGINS=https://hms.bitnesttechs.com,https://patient.bitnesttechs.com in Railway env vars.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:5173}
  # Directory where uploaded files are stored.
  # On Railway, set APP_UPLOAD_DIR to the persistent-volume mount path
  # (e.g. /data/uploads) so files survive redeployments.
  upload:
    dir: ${APP_UPLOAD_DIR:uploads}
