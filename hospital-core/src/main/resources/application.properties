# ===================== App & Web =====================
spring.application.name=hms
server.servlet.context-path=/api

# Active profile (override with SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local-h2}

# ===================== i18n =====================
spring.messages.basename=messages
spring.messages.always-use-message-format=true
spring.messages.use-code-as-default-message=true
spring.messages.encoding=UTF-8

# ===================== Jackson =====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ===================== JPA / Hibernate =====================
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.liquibase.change-log=classpath:db/migration/changelog.xml

# ===================== OpenAPI =====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===================== Logging =====================
logging.level.root=INFO
logging.level.com.example.hms=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %5p [%t] %-40.40logger{39} - %msg%n

# ===================== JWT =====================
app.jwt.secret=${JWT_SECRET:dev-secret-change-me-in-production-minimum-256-bits-long!!}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_MS:172800000}
# RS256 asymmetric signing (Phase 6) — set these env vars to enable RS256 instead of HMAC
app.jwt.private-key=${JWT_PRIVATE_KEY:}
app.jwt.public-key=${JWT_PUBLIC_KEY:}
app.jwt.previous-public-key=${JWT_PREVIOUS_PUBLIC_KEY:}

# ===================== MFA =====================
# Roles that require MFA. Override via MFA_REQUIRED_ROLES env var.
app.mfa.required-roles=${MFA_REQUIRED_ROLES:ROLE_SUPER_ADMIN,ROLE_HOSPITAL_ADMIN,ROLE_DOCTOR,ROLE_PHARMACIST,ROLE_FINANCE}

# Rate limiting (T-40)
app.rate-limit.requests-per-minute=${RATE_LIMIT_RPM:120}

# ===================== Mail (env-driven) =====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.health.mail.enabled=${MAIL_HEALTH_ENABLED:false}

# ===================== Actuator =====================
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.add-additional-paths=true
management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true
management.otlp.metrics.export.enabled=${OTEL_METRICS_ENABLED:false}

# ===================== File Upload =====================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.backend.base-url=${BACKEND_BASE_URL:http://localhost:8081}
app.frontend.base-url=${FRONTEND_BASE_URL:https://hms.dev.bitnesttechs.com}

# ===================== Portal URL Templates =====================
# Derived from app.frontend.base-url — overridable per environment.
app.portal.profile-completion-url-template=${app.frontend.base-url}/onboarding/role-welcome?assignment=%s
app.portal.assigner-confirmation-url-template=${app.frontend.base-url}/super/assignments?confirm=%s

# Public base URL prepended to uploaded-file paths returned to the browser.
# MUST be set to the public-facing origin in production so browsers can
# reach the file (e.g. https://hms.dev.bitnesttechs.com).
# When empty the service falls back to the current request origin (local dev).
app.public-base-url=${PUBLIC_BASE_URL:}

# ===================== CORS =====================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ===================== Auth — refresh-token cookie (S-01) =====================
# The refresh token is delivered via an HttpOnly cookie so it is unreadable
# from JavaScript (mitigates XSS-based token theft).
# Secure=false is only appropriate for plain-HTTP local dev.
app.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:true}
app.auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAMESITE:Strict}

# ===================== Keycloak / OIDC resource server (S-03 phase 1) =====================
# When OIDC_ISSUER_URI is set (e.g. https://keycloak.example.com/realms/hms), the app
# becomes an OAuth2 Resource Server that ALSO accepts Keycloak-issued JWTs alongside
# its own internally-issued tokens. Internal tokens (no `iss` claim) continue through
# JwtAuthenticationFilter; tokens whose `iss` matches OIDC_ISSUER_URI are routed to
# the Spring Security oauth2-resource-server stack via IssuerAwareBearerTokenResolver.
# Empty default = OIDC stack is not wired and behaviour is identical to today.
# OIDC_AUDIENCE (optional) enables strict `aud` claim validation when set.
app.auth.oidc.issuer-uri=${OIDC_ISSUER_URI:}
app.auth.oidc.audience=${OIDC_AUDIENCE:}

# KC-5 prep — soak flag that disables the legacy internal token issuer
# (POST /auth/login, POST /auth/token/refresh) without touching the
# resource-server stack. Already-issued tokens continue to validate
# through JwtAuthenticationFilter until they expire naturally. Flip to
# `true` in UAT/prod during the Phase 2.6 soak window; once Grafana
# confirms zero legacy traffic, Phase 3 physically removes the issuer.
# Default `false` preserves today's behaviour exactly.
app.auth.oidc.required=${OIDC_REQUIRED:false}

# ===================== PHI field-level encryption (S-05) =====================
# AES-256-GCM key as Base64 of 32 bytes. Empty in dev = converter is loaded
# but inactive (legacy plaintext rows are returned as-is, encrypt attempts
# fail fast with a clear error). Production (application-prod.yml) MUST
# supply this via env var APP_ENCRYPTION_KEY with no default.
app.encryption.key=${APP_ENCRYPTION_KEY:}

# ===================== Redis (token blacklist) =====================
# Set to true in environments with Redis available to share JWT blacklist
# across instances. When false (default), the in-memory blacklist is used.
# Redis connection properties (spring.data.redis.*) must be configured
# alongside this flag.
app.redis.token-blacklist.enabled=${REDIS_TOKEN_BLACKLIST_ENABLED:false}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000ms}
# Disable the auto-configured Redis health indicator unless Redis is actually
# wired. Otherwise Spring Boot's /actuator/health returns DOWN (503) in envs
# without Redis, which causes Railway's healthcheck to fail the deploy.
# Set REDIS_HEALTH_ENABLED=true alongside REDIS_TOKEN_BLACKLIST_ENABLED=true
# in environments with a real Redis instance.
management.health.redis.enabled=${REDIS_HEALTH_ENABLED:false}

# ===================== Connection Pool =====================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000

# ===================== Kafka Topics =====================
app.kafka.chat-topic=${KAFKA_CHAT_TOPIC:hms.chat}
app.kafka.empi-identity-topic=${KAFKA_EMPI_TOPIC:hms.empi.identity}
app.kafka.patient-movement-topic=${KAFKA_PATIENT_MOVEMENT_TOPIC:hms.patient.movement}
app.kafka.platform-registry-topic=${KAFKA_PLATFORM_REGISTRY_TOPIC:hms.platform.registry}
app.kafka.enabled=${KAFKA_ENABLED:false}
