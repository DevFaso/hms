<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <linearGradient id="shieldGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#009E49"/>
      <stop offset="100%" stop-color="#007A3A"/>
    </linearGradient>
    <linearGradient id="shieldRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF2B2D"/>
      <stop offset="100%" stop-color="#C41E1E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
  </defs>

  <!-- Shield outline -->
  <path d="M300 120 L460 180 L460 380 Q460 500 300 580 Q140 500 140 380 L140 180 Z"
        fill="url(#shieldGreen)" stroke="#006B35" stroke-width="4"/>

  <!-- Shield center band (red) -->
  <path d="M300 120 L460 180 L460 380 Q460 500 300 580 Q140 500 140 380 L140 180 Z"
        fill="none" stroke="none"/>
  <clipPath id="shieldClip">
    <path d="M300 120 L460 180 L460 380 Q460 500 300 580 Q140 500 140 380 L140 180 Z"/>
  </clipPath>

  <!-- Green top band -->
  <rect x="130" y="110" width="340" height="160" fill="url(#shieldGreen)" clip-path="url(#shieldClip)"/>
  <!-- Red middle band -->
  <rect x="130" y="270" width="340" height="140" fill="url(#shieldRed)" clip-path="url(#shieldClip)"/>
  <!-- Green bottom band -->
  <rect x="130" y="410" width="340" height="200" fill="url(#shieldGreen)" clip-path="url(#shieldClip)"/>

  <!-- Shield border -->
  <path d="M300 120 L460 180 L460 380 Q460 500 300 580 Q140 500 140 380 L140 180 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="5"/>

  <!-- Gold star on center (red) band -->
  <polygon points="300,290 312,325 350,325 319,348 330,385 300,362 270,385 281,348 250,325 288,325"
           fill="url(#goldGrad)" stroke="#B8860B" stroke-width="1"/>

  <!-- Crossed lances behind shield -->
  <!-- Left lance -->
  <line x1="120" y1="100" x2="480" y2="600" stroke="#8B4513" stroke-width="6" stroke-linecap="round"/>
  <!-- Right lance -->
  <line x1="480" y1="100" x2="120" y2="600" stroke="#8B4513" stroke-width="6" stroke-linecap="round"/>
  <!-- Lance tips (spearheads) -->
  <polygon points="113,92 120,100 127,92 120,75" fill="#A0A0A0" stroke="#707070" stroke-width="1"/>
  <polygon points="473,92 480,100 487,92 480,75" fill="#A0A0A0" stroke="#707070" stroke-width="1"/>

  <!-- Horses (stylized) - Left -->
  <g transform="translate(40, 200) scale(0.6)" opacity="0.95">
    <!-- Horse body -->
    <ellipse cx="100" cy="300" rx="65" ry="40" fill="#F5DEB3" stroke="#8B4513" stroke-width="2"/>
    <!-- Horse neck -->
    <path d="M140 280 Q170 220 155 180" fill="none" stroke="#8B4513" stroke-width="8"/>
    <path d="M140 280 Q170 220 155 180" fill="none" stroke="#F5DEB3" stroke-width="5"/>
    <!-- Horse head -->
    <ellipse cx="152" cy="172" rx="22" ry="16" fill="#F5DEB3" stroke="#8B4513" stroke-width="2" transform="rotate(-15, 152, 172)"/>
    <!-- Eye -->
    <circle cx="160" cy="168" r="3" fill="#333"/>
    <!-- Mane -->
    <path d="M148 160 Q140 190 135 220 Q142 205 145 185" fill="#8B4513"/>
    <!-- Front legs -->
    <line x1="80" y1="330" x2="70" y2="400" stroke="#8B4513" stroke-width="5"/>
    <line x1="110" y1="335" x2="100" y2="405" stroke="#8B4513" stroke-width="5"/>
    <!-- Rear legs -->
    <line x1="60" y1="325" x2="45" y2="400" stroke="#8B4513" stroke-width="5"/>
    <line x1="40" y1="320" x2="25" y2="395" stroke="#8B4513" stroke-width="5"/>
    <!-- Hooves -->
    <rect x="65" y="398" width="15" height="6" rx="3" fill="#333"/>
    <rect x="95" y="403" width="15" height="6" rx="3" fill="#333"/>
    <rect x="40" y="398" width="15" height="6" rx="3" fill="#333"/>
    <rect x="20" y="393" width="15" height="6" rx="3" fill="#333"/>
    <!-- Tail -->
    <path d="M35 290 Q10 310 15 340" fill="none" stroke="#8B4513" stroke-width="4"/>
  </g>

  <!-- Horse - Right (mirrored) -->
  <g transform="translate(600, 200) scale(-0.6, 0.6)" opacity="0.95">
    <!-- Horse body -->
    <ellipse cx="100" cy="300" rx="65" ry="40" fill="#F5DEB3" stroke="#8B4513" stroke-width="2"/>
    <!-- Horse neck -->
    <path d="M140 280 Q170 220 155 180" fill="none" stroke="#8B4513" stroke-width="8"/>
    <path d="M140 280 Q170 220 155 180" fill="none" stroke="#F5DEB3" stroke-width="5"/>
    <!-- Horse head -->
    <ellipse cx="152" cy="172" rx="22" ry="16" fill="#F5DEB3" stroke="#8B4513" stroke-width="2" transform="rotate(-15, 152, 172)"/>
    <!-- Eye -->
    <circle cx="160" cy="168" r="3" fill="#333"/>
    <!-- Mane -->
    <path d="M148 160 Q140 190 135 220 Q142 205 145 185" fill="#8B4513"/>
    <!-- Front legs -->
    <line x1="80" y1="330" x2="70" y2="400" stroke="#8B4513" stroke-width="5"/>
    <line x1="110" y1="335" x2="100" y2="405" stroke="#8B4513" stroke-width="5"/>
    <!-- Rear legs -->
    <line x1="60" y1="325" x2="45" y2="400" stroke="#8B4513" stroke-width="5"/>
    <line x1="40" y1="320" x2="25" y2="395" stroke="#8B4513" stroke-width="5"/>
    <!-- Hooves -->
    <rect x="65" y="398" width="15" height="6" rx="3" fill="#333"/>
    <rect x="95" y="403" width="15" height="6" rx="3" fill="#333"/>
    <rect x="40" y="398" width="15" height="6" rx="3" fill="#333"/>
    <rect x="20" y="393" width="15" height="6" rx="3" fill="#333"/>
    <!-- Tail -->
    <path d="M35 290 Q10 310 15 340" fill="none" stroke="#8B4513" stroke-width="4"/>
  </g>

  <!-- Scroll/ribbon at bottom -->
  <path d="M120 620 Q180 600 300 610 Q420 600 480 620 L470 650 Q420 635 300 645 Q180 635 130 650 Z"
        fill="url(#goldGrad)" stroke="#B8860B" stroke-width="2"/>

  <!-- Motto text on ribbon -->
  <text x="300" y="642" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#333">
    UNITÉ - PROGRÈS - JUSTICE
  </text>

  <!-- Book (open) on top of shield -->
  <g transform="translate(265, 135)">
    <!-- Left page -->
    <rect x="0" y="0" width="30" height="40" rx="2" fill="#FFFFF0" stroke="#8B4513" stroke-width="1.5" transform="rotate(-8, 30, 40)"/>
    <!-- Right page -->
    <rect x="40" y="0" width="30" height="40" rx="2" fill="#FFFFF0" stroke="#8B4513" stroke-width="1.5" transform="rotate(8, 40, 40)"/>
    <!-- Spine -->
    <line x1="35" y1="0" x2="35" y2="40" stroke="#8B4513" stroke-width="2"/>
    <!-- Text lines on pages -->
    <line x1="10" y1="10" x2="28" y2="9" stroke="#CCC" stroke-width="1"/>
    <line x1="10" y1="16" x2="28" y2="15" stroke="#CCC" stroke-width="1"/>
    <line x1="10" y1="22" x2="28" y2="21" stroke="#CCC" stroke-width="1"/>
    <line x1="42" y1="9" x2="60" y2="10" stroke="#CCC" stroke-width="1"/>
    <line x1="42" y1="15" x2="60" y2="16" stroke="#CCC" stroke-width="1"/>
    <line x1="42" y1="21" x2="60" y2="22" stroke="#CCC" stroke-width="1"/>
  </g>

  <!-- Grain stalks (wheat/millet) - left side -->
  <g transform="translate(90, 450)" opacity="0.9">
    <line x1="30" y1="80" x2="30" y2="0" stroke="#228B22" stroke-width="3"/>
    <ellipse cx="25" cy="10" rx="5" ry="12" fill="#FFD700" transform="rotate(-20, 25, 10)"/>
    <ellipse cx="35" cy="15" rx="5" ry="12" fill="#FFD700" transform="rotate(20, 35, 15)"/>
    <ellipse cx="25" cy="25" rx="5" ry="12" fill="#FFD700" transform="rotate(-15, 25, 25)"/>
    <ellipse cx="35" cy="30" rx="5" ry="12" fill="#FFD700" transform="rotate(15, 35, 30)"/>
    <ellipse cx="30" cy="0" rx="4" ry="10" fill="#FFD700"/>
  </g>

  <!-- Grain stalks - right side -->
  <g transform="translate(480, 450)" opacity="0.9">
    <line x1="30" y1="80" x2="30" y2="0" stroke="#228B22" stroke-width="3"/>
    <ellipse cx="25" cy="10" rx="5" ry="12" fill="#FFD700" transform="rotate(-20, 25, 10)"/>
    <ellipse cx="35" cy="15" rx="5" ry="12" fill="#FFD700" transform="rotate(20, 35, 15)"/>
    <ellipse cx="25" cy="25" rx="5" ry="12" fill="#FFD700" transform="rotate(-15, 25, 25)"/>
    <ellipse cx="35" cy="30" rx="5" ry="12" fill="#FFD700" transform="rotate(15, 35, 30)"/>
    <ellipse cx="30" cy="0" rx="4" ry="10" fill="#FFD700"/>
  </g>
</svg>
