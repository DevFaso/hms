---
extends: default

ignore: |
  node_modules/
  **/node_modules/
  orm/decommissioned/
  platform/decommissioned/

rules:
  line-length:
    max: 250
  document-start: disable
  truthy:
    allowed-values: ['true', 'false', 'on']
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
