# Railway service config for HMS Keycloak (dev / uat / prod).
#
# This single file is referenced by all three `hms-keycloak-{env}` Railway
# services. Each service sets its own `BUILD_CONFIG` env var (`dev`, `uat`,
# or `prod`); Railway forwards env vars matching declared Dockerfile ARGs
# to the build, so `BUILD_CONFIG` becomes the build-time selector. See
# `README.md` in this folder for the per-env provisioning recipe.

[build]
builder = "dockerfile"
dockerfilePath = "keycloak/prod/Dockerfile"

[deploy]
# Keycloak's built-in readiness probe. `KC_HEALTH_ENABLED=true` is set in
# the Dockerfile.
healthcheckPath = "/health/ready"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health/ready"
interval = 30
timeout = 30
